<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Bump Map (Sphere) + Normal Map (Model) - SHADER VERSION</title>
    <style>
        body {
            margin: 0;
            overflow: hidden;
            font-family: monospace;
        }
        .controls {
            position: absolute;
            top: 12px;
            right: 12px;
            background: rgba(0,0,0,0.75);
            backdrop-filter: blur(4px);
            padding: 8px 12px;
            border-radius: 8px;
            color: #eee;
            z-index: 100;
            font-size: 12px;
            min-width: 210px;
        }
        .controls h3 {
            margin: 0 0 6px 0;
            font-size: 13px;
            color: #ffaa66;
        }
        .control-group {
            margin-bottom: 8px;
        }
        .control-group label {
            font-size: 11px;
            display: block;
            margin-bottom: 3px;
        }
        input[type="range"] {
            width: 100%;
            cursor: pointer;
            height: 3px;
        }
        button {
            background: #333;
            border: none;
            padding: 4px 8px;
            border-radius: 4px;
            cursor: pointer;
            font-size: 11px;
            color: white;
            margin-right: 6px;
            margin-top: 2px;
        }
        button:hover {
            background: #ffaa44;
            color: black;
        }
        .file-selector {
            margin-top: 6px;
            padding-top: 4px;
            border-top: 1px solid #555;
        }
        .file-selector label {
            font-size: 10px;
        }
        .file-selector input {
            font-size: 10px;
            background: #222;
            color: white;
            border: 1px solid #666;
            border-radius: 4px;
            padding: 3px 5px;
            width: calc(100% - 12px);
        }
        .compact-row {
            display: flex;
            align-items: center;
            justify-content: space-between;
            gap: 8px;
        }
        .separator {
            height: 1px;
            background: #555;
            margin: 8px 0;
        }
        #resetModelBtn, #resetBumpBtn, #resetNormalBtn {
            width: 100%;
            background: #444;
            margin-top: 5px;
        }
        #resetBumpBtn {
            background: #5a3a2a;
        }
        #resetNormalBtn {
            background: #3a3a5a;
        }
        .status {
            position: absolute;
            bottom: 12px;
            left: 12px;
            background: rgba(0,0,0,0.6);
            padding: 4px 10px;
            border-radius: 5px;
            font-size: 11px;
            pointer-events: none;
            z-index: 100;
            color: #ddd;
            font-family: monospace;
        }
        .legend {
            position: absolute;
            bottom: 12px;
            right: 12px;
            background: rgba(0,0,0,0.55);
            padding: 5px 10px;
            border-radius: 6px;
            font-size: 10px;
            color: #ccc;
            text-align: right;
            pointer-events: none;
        }
    </style>
</head>
<body>
    <div class="controls">
        <h3>Bump (Sphere) | Normal (Model) - SHADER</h3>
        
        <div class="control-group">
            <div class="compact-row">
                <label>Bump Intensity (sphere)</label>
                <span style="font-size:9px;">height scale</span>
            </div>
            <input type="range" id="bumpIntensity" min="0" max="2.5" step="0.01" value="0.9">
        </div>
        
        <div class="control-group">
            <div class="compact-row">
                <label>Normal Intensity (model)</label>
                <span style="font-size:9px;">strength</span>
            </div>
            <input type="range" id="normalIntensity" min="0" max="2.0" step="0.01" value="1.0">
        </div>
        
        <div class="compact-row">
            <button id="btnPhong">Phong</button>
            <button id="btnBlinn">Blinn</button>
            <label>Ambient</label>
            <input type="range" id="ambient" min="0" max="0.8" step="0.01" value="0.32" style="width:55px;">
        </div>
        
        <div class="file-selector">
            <label>Height Map (for BUMP on sphere)</label>
            <input type="file" id="textureFile" accept="image/*">
            <button id="resetBumpBtn">Clear bump map</button>
        </div>
        
        <div class="file-selector">
            <label>Normal Map (for NORMAL on model)</label>
            <input type="file" id="normalMapFile" accept="image/*">
            <button id="resetNormalBtn" style="margin-top:4px;">Clear normal map</button>
        </div>
        
        <div class="file-selector">
            <label>3D Model (OBJ/GLTF)</label>
            <input type="file" id="modelFile" accept=".obj,.gltf,.glb">
            <button id="resetModelBtn">Remove model</button>
        </div>
    </div>

    <script type="importmap">
        {
            "imports": {
                "three": "https://unpkg.com/three@0.128.0/build/three.module.js",
                "three/addons/": "https://unpkg.com/three@0.128.0/examples/jsm/"
            }
        }
    </script>

    <script type="module">
        import * as THREE from 'three';
        import { OrbitControls } from 'three/addons/controls/OrbitControls.js';
        import { GLTFLoader } from 'three/addons/loaders/GLTFLoader.js';
        import { OBJLoader } from 'three/addons/loaders/OBJLoader.js';

        // Сцена
        const scene = new THREE.Scene();
        scene.background = new THREE.Color(0x050510);
        scene.fog = new THREE.FogExp2(0x050510, 0.008);

        const camera = new THREE.PerspectiveCamera(42, window.innerWidth / window.innerHeight, 0.1, 100);
        camera.position.set(2.5, 1.6, 5.2);
        camera.lookAt(0, 0.2, 0);

        const renderer = new THREE.WebGLRenderer({ antialias: true });
        renderer.setSize(window.innerWidth, window.innerHeight);
        renderer.shadowMap.enabled = true;
        document.body.appendChild(renderer.domElement);

        const controls = new OrbitControls(camera, renderer.domElement);
        controls.enableDamping = true;
        controls.dampingFactor = 0.05;
        controls.target.set(0, 0.2, 0);

        // Освещение
        const ambientLight = new THREE.AmbientLight(0x404060, 0.32);
        scene.add(ambientLight);
        const mainLight = new THREE.DirectionalLight(0xfff5e0, 1.25);
        mainLight.position.set(3, 4.2, 2);
        mainLight.castShadow = true;
        scene.add(mainLight);
        const fillLight = new THREE.PointLight(0x88aacc, 0.5);
        fillLight.position.set(-2, 2, 3);
        scene.add(fillLight);
        const backLight = new THREE.PointLight(0xffaa77, 0.45);
        backLight.position.set(1, 2.2, -3);
        scene.add(backLight);
        
        const rimLight = new THREE.PointLight(0xffaa88, 0.35);
        rimLight.position.set(1.5, 1, -2.5);
        scene.add(rimLight);

        const grid = new THREE.GridHelper(10, 20, 0x88aacc, 0x335577);
        grid.position.y = -0.85;
        grid.material.transparent = true;
        grid.material.opacity = 0.3;
        scene.add(grid);
        
        const ground = new THREE.Mesh(
            new THREE.PlaneGeometry(10, 10),
            new THREE.ShadowMaterial({ opacity: 0.4, transparent: true, side: THREE.DoubleSide })
        );
        ground.rotation.x = -Math.PI / 2;
        ground.position.y = -0.85;
        ground.receiveShadow = true;
        scene.add(ground);

        // Сфера
        const ORANGE_COLOR = 0xff6600;
        const sphereGeo = new THREE.SphereGeometry(0.85, 160, 160);
        let sphereMat = new THREE.MeshStandardMaterial({ 
            color: ORANGE_COLOR, 
            roughness: 0.45, 
            metalness: 0.2,
            map: null
        });
        const sphere = new THREE.Mesh(sphereGeo, sphereMat);
        sphere.position.set(-1.2, 0, 0);
        sphere.castShadow = true;
        sphere.receiveShadow = true;
        scene.add(sphere);

        // Модель
        let userModel = null;
        let currentNormalMapTexture = null;
        let currentNormalMapStrength = 1.0;
        let currentBumpHeightImg = null;
        
        // Хранилище оригинальных материалов для модели
        let modelOriginalMaterials = new Map();

        // ========== BUMP MAPPING ЧЕРЕЗ ШЕЙДЕР ==========
        let currentSphereShaderMaterial = null;
        
        function applyBumpToSphere(img, intensity) {
            if (!sphere || !img) return;
            
            // Создаем текстуру высоты
            const heightTexture = new THREE.Texture(img);
            heightTexture.wrapS = THREE.RepeatWrapping;
            heightTexture.wrapT = THREE.RepeatWrapping;
            heightTexture.repeat.set(2.0, 2.0);
            heightTexture.needsUpdate = true;
            
            // Создаем шейдерный материал для сферы
            const shaderMat = new THREE.ShaderMaterial({
                uniforms: {
                    uColor: { value: new THREE.Color(ORANGE_COLOR) },
                    uBumpIntensity: { value: intensity },
                    uHeightMap: { value: heightTexture },
                    uRoughness: { value: 0.45 },
                    uMetalness: { value: 0.2 },
                    uAmbientIntensity: { value: ambientLight.intensity }
                },
                vertexShader: `
                    varying vec2 vUv;
                    varying vec3 vNormal;
                    varying vec3 vViewPosition;
                    
                    void main() {
                        vUv = uv;
                        vNormal = normalize(normalMatrix * normal);
                        vec4 mvPosition = modelViewMatrix * vec4(position, 1.0);
                        vViewPosition = -mvPosition.xyz;
                        gl_PointSize = 1.0;
                        gl_Position = projectionMatrix * mvPosition;
                    }
                `,
                fragmentShader: `
                    uniform vec3 uColor;
                    uniform float uBumpIntensity;
                    uniform sampler2D uHeightMap;
                    uniform float uRoughness;
                    uniform float uMetalness;
                    uniform float uAmbientIntensity;
                    
                    varying vec2 vUv;
                    varying vec3 vNormal;
                    varying vec3 vViewPosition;
                    
                    void main() {
                        vec3 N = normalize(vNormal);
                        
                        // Bump mapping через производные от высоты
                        if (uBumpIntensity > 0.0 && uHeightMap != null) {
                            float h = texture2D(uHeightMap, vUv).r;
                            float hx = texture2D(uHeightMap, vUv + vec2(dFdx(vUv).x, 0.0)).r;
                            float hy = texture2D(uHeightMap, vUv + vec2(0.0, dFdy(vUv).y)).r;
                            
                            float dHdu = (hx - h) * uBumpIntensity;
                            float dHdv = (hy - h) * uBumpIntensity;
                            
                            vec3 T = normalize(dFdx(vViewPosition));
                            vec3 B = normalize(dFdy(vViewPosition));
                            N = normalize(N + T * dHdu + B * dHdv);
                        }
                        
                        // Направленный свет
                        vec3 lightDir = normalize(vec3(3.0, 4.2, 2.0));
                        float diff = max(0.2, dot(N, lightDir));
                        
                        vec3 finalColor = uColor * (diff + uAmbientIntensity);
                        gl_FragColor = vec4(finalColor, 1.0);
                    }
                `
            });
            
            sphere.material = shaderMat;
            sphereMat = shaderMat;
            currentSphereShaderMaterial = shaderMat;
        }
        
        function removeBumpFromSphere() {
            // Восстанавливаем обычный материал
            const newMat = new THREE.MeshStandardMaterial({ 
                color: ORANGE_COLOR, 
                roughness: 0.45, 
                metalness: 0.2 
            });
            sphere.material = newMat;
            sphereMat = newMat;
            currentSphereShaderMaterial = null;
        }
        
        function updateSphereBumpIntensity() {
            if (currentBumpHeightImg && sphere.material && sphere.material.uniforms) {
                const val = parseFloat(document.getElementById('bumpIntensity').value);
                sphere.material.uniforms.uBumpIntensity.value = val;
                document.getElementById('statusMsg').innerHTML = `Sphere: BUMP active (intensity ${val.toFixed(2)}) | Normal intensity: ${currentNormalMapStrength.toFixed(2)} | Model: ${currentNormalMapTexture ? 'normal map active' : 'no normal map'}`;
            }
        }

        function applyNormalMapWithStrength(modelObj, normalTextureImage, strength) {
            if (!modelObj || !normalTextureImage) return;
            
            // Создаем текстуру normal map
            const normalTex = new THREE.Texture(normalTextureImage);
            normalTex.wrapS = THREE.RepeatWrapping;
            normalTex.wrapT = THREE.RepeatWrapping;
            normalTex.repeat.set(2.0, 2.0);
            normalTex.needsUpdate = true;
            
            modelObj.traverse(child => {
                if (child.isMesh) {
                    // Сохраняем оригинальный материал если еще не сохранен
                    if (!modelOriginalMaterials.has(child.uuid)) {
                        modelOriginalMaterials.set(child.uuid, child.material.clone());
                    }
                    
                    const origMat = child.material;
                    
                    const shaderMat = new THREE.ShaderMaterial({
                        uniforms: {
                            uBaseColor: { value: origMat.color ? origMat.color.clone() : new THREE.Color(0xccaa88) },
                            uMainTex: { value: origMat.map || null },
                            uNormalMap: { value: normalTex },
                            uNormalIntensity: { value: strength },
                            uRoughness: { value: origMat.roughness || 0.45 },
                            uMetalness: { value: origMat.metalness || 0.2 },
                            uAmbientIntensity: { value: ambientLight.intensity }
                        },
                        vertexShader: `
                            varying vec2 vUv;
                            varying vec3 vNormal;
                            varying vec3 vViewPosition;
                            
                            void main() {
                                vUv = uv;
                                vNormal = normalize(normalMatrix * normal);
                                vec4 mvPosition = modelViewMatrix * vec4(position, 1.0);
                                vViewPosition = -mvPosition.xyz;
                                gl_PointSize = 1.0;
                                gl_Position = projectionMatrix * mvPosition;
                            }
                        `,
                        fragmentShader: `
                            uniform vec3 uBaseColor;
                            uniform sampler2D uMainTex;
                            uniform sampler2D uNormalMap;
                            uniform float uNormalIntensity;
                            uniform float uRoughness;
                            uniform float uMetalness;
                            uniform float uAmbientIntensity;
                            
                            varying vec2 vUv;
                            varying vec3 vNormal;
                            varying vec3 vViewPosition;
                            
                            void main() {
                                vec3 N = normalize(vNormal);
                                
                                // Normal mapping с контролем интенсивности
                                if (uNormalIntensity > 0.0 && uNormalMap != null) {
                                    vec3 mapN = texture2D(uNormalMap, vUv).xyz * 2.0 - 1.0;
                                    
                                    vec3 T = normalize(dFdx(vViewPosition));
                                    vec3 B = normalize(dFdy(vViewPosition));
                                    mat3 TBN = mat3(T, B, N);
                                    vec3 tangentNormal = normalize(TBN * mapN);
                                    
                                    N = normalize(mix(N, tangentNormal, uNormalIntensity));
                                }
                                
                                // Направленный свет
                                vec3 lightDir = normalize(vec3(3.0, 4.2, 2.0));
                                float diff = max(0.2, dot(N, lightDir));
                                
                                vec3 albedo = uBaseColor.rgb;
                                if (uMainTex != null) {
                                    albedo *= texture2D(uMainTex, vUv).rgb;
                                }
                                
                                vec3 finalColor = albedo * (diff + uAmbientIntensity);
                                gl_FragColor = vec4(finalColor, 1.0);
                            }
                        `
                    });
                    
                    child.material = shaderMat;
                    if (origMat !== shaderMat && origMat.dispose) origMat.dispose();
                }
            });
        }
        
        function updateNormalIntensity() {
            if (userModel && currentNormalMapTexture) {
                currentNormalMapStrength = parseFloat(document.getElementById('normalIntensity').value);
                applyNormalMapWithStrength(userModel, currentNormalMapTexture, currentNormalMapStrength);
                document.getElementById('statusMsg').innerHTML = `Normal intensity: ${currentNormalMapStrength.toFixed(2)} | Sphere bump: ${currentBumpHeightImg ? 'active' : 'inactive'}`;
            } else if (!userModel && currentNormalMapTexture) {
                document.getElementById('statusMsg').innerHTML = `Normal intensity set to ${currentNormalMapStrength.toFixed(2)} but no model loaded.`;
            }
        }
        
        function clearNormalMapFromModel(modelObj) {
            if (!modelObj) return;
            
            modelObj.traverse(child => {
                if (child.isMesh && modelOriginalMaterials.has(child.uuid)) {
                    const origMat = modelOriginalMaterials.get(child.uuid);
                    if (child.material && child.material.dispose) child.material.dispose();
                    child.material = origMat.clone();
                }
            });
        }
        
        // Загрузка bump текстуры
        function loadBumpTextureFromFile(file) {
            const reader = new FileReader();
            reader.onload = (e) => {
                const img = new Image();
                img.onload = () => {
                    currentBumpHeightImg = img;
                    const intensity = parseFloat(document.getElementById('bumpIntensity').value);
                    applyBumpToSphere(img, intensity);
                    document.getElementById('statusMsg').innerHTML = `Sphere BUMP: ${file.name} | Normal intensity: ${currentNormalMapStrength.toFixed(2)} | Model normal: ${currentNormalMapTexture ? 'active' : 'none'}`;
                };
                img.src = e.target.result;
            };
            reader.readAsDataURL(file);
        }
        
        function resetBumpMap() {
            currentBumpHeightImg = null;
            removeBumpFromSphere();
            document.getElementById('statusMsg').innerHTML = `Bump map cleared. Sphere is orange. Normal intensity: ${currentNormalMapStrength.toFixed(2)} | Model: ${currentNormalMapTexture ? 'normal map active' : 'no normal map'}`;
        }
        
        // Загрузка normal текстуры для модели
        function loadNormalMapForModel(file) {
            const reader = new FileReader();
            reader.onload = (e) => {
                const img = new Image();
                img.onload = () => {
                    currentNormalMapTexture = img;
                    currentNormalMapStrength = parseFloat(document.getElementById('normalIntensity').value);
                    if (userModel) {
                        applyNormalMapWithStrength(userModel, img, currentNormalMapStrength);
                        document.getElementById('statusMsg').innerHTML = `Normal map applied: ${file.name} | Intensity: ${currentNormalMapStrength.toFixed(2)} | Sphere bump: ${currentBumpHeightImg ? 'active' : 'inactive'}`;
                    } else {
                        document.getElementById('statusMsg').innerHTML = `Normal map loaded (${file.name}), but no model. Load OBJ/GLTF first. Intensity: ${currentNormalMapStrength.toFixed(2)}`;
                    }
                };
                img.src = e.target.result;
            };
            reader.readAsDataURL(file);
        }
        
        function resetNormalMapOnModel() {
            currentNormalMapTexture = null;
            if (userModel) {
                clearNormalMapFromModel(userModel);
                document.getElementById('statusMsg').innerHTML = `Normal map removed. Sphere bump: ${currentBumpHeightImg ? 'active' : 'inactive'}`;
            } else {
                document.getElementById('statusMsg').innerHTML = 'Normal map cleared (no model loaded).';
            }
        }
        
        // Загрузка модели
        function disposeOldModel() {
            if (userModel) {
                scene.remove(userModel);
                userModel.traverse((child) => {
                    if (child.isMesh) {
                        if (child.geometry) child.geometry.dispose();
                        if (child.material) {
                            if (Array.isArray(child.material)) child.material.forEach(m => m.dispose());
                            else child.material.dispose();
                        }
                    }
                });
                userModel = null;
                modelOriginalMaterials.clear();
            }
        }
        
        function alignModelToGround(modelObj, targetX) {
            const box = new THREE.Box3().setFromObject(modelObj);
            const center = box.getCenter(new THREE.Vector3());
            const size = box.getSize(new THREE.Vector3());
            const maxDim = Math.max(size.x, size.y, size.z);
            const targetScale = 1.25 / maxDim;
            modelObj.scale.set(targetScale, targetScale, targetScale);
            
            const scaledBox = new THREE.Box3().setFromObject(modelObj);
            const scaledCenter = scaledBox.getCenter(new THREE.Vector3());
            modelObj.position.x = targetX - scaledCenter.x;
            modelObj.position.z = -scaledCenter.z;
            
            const finalBox = new THREE.Box3().setFromObject(modelObj);
            const finalMinY = finalBox.min.y;
            const groundLevel = -0.85;
            const yOffset = groundLevel - finalMinY;
            modelObj.position.y += yOffset;
        }
        
        const gltfLoader = new GLTFLoader();
        const objLoader = new OBJLoader();
        
        document.getElementById('modelFile').addEventListener('change', (e) => {
            const file = e.target.files[0];
            if (!file) return;
            const ext = file.name.split('.').pop().toLowerCase();
            
            const loadAndApplyNormal = (modelObj) => {
                disposeOldModel();
                userModel = modelObj;
                scene.add(userModel);
                alignModelToGround(userModel, 1.2);
                if (currentNormalMapTexture) {
                    applyNormalMapWithStrength(userModel, currentNormalMapTexture, currentNormalMapStrength);
                }
                document.getElementById('statusMsg').innerHTML = `Model: ${file.name} | Normal map ${currentNormalMapTexture ? 'applied' : 'none'} | Intensity: ${currentNormalMapStrength.toFixed(2)} | Sphere bump: ${currentBumpHeightImg ? 'active' : 'inactive'}`;
            };
            
            if (ext === 'obj') {
                const reader = new FileReader();
                reader.onload = (ev) => {
                    try {
                        const objModel = objLoader.parse(ev.target.result);
                        loadAndApplyNormal(objModel);
                    } catch(err) {
                        document.getElementById('statusMsg').innerHTML = 'OBJ parse error';
                    }
                };
                reader.readAsText(file);
            } else if (ext === 'gltf' || ext === 'glb') {
                const reader = new FileReader();
                reader.onload = (ev) => {
                    gltfLoader.parse(ev.target.result, '', (gltf) => {
                        loadAndApplyNormal(gltf.scene);
                    }, () => {
                        document.getElementById('statusMsg').innerHTML = 'GLTF error';
                    });
                };
                reader.readAsArrayBuffer(file);
            }
        });
        
        document.getElementById('resetModelBtn').addEventListener('click', () => {
            disposeOldModel();
            document.getElementById('statusMsg').innerHTML = `Model removed. Sphere bump: ${currentBumpHeightImg ? 'active' : 'inactive (orange)'}`;
        });
        
        document.getElementById('resetNormalBtn').addEventListener('click', () => {
            resetNormalMapOnModel();
        });
        
        document.getElementById('resetBumpBtn').addEventListener('click', () => {
            resetBumpMap();
        });
        
        // UI события
        document.getElementById('textureFile').addEventListener('change', (e) => {
            if (e.target.files.length) loadBumpTextureFromFile(e.target.files[0]);
        });
        
        document.getElementById('normalMapFile').addEventListener('change', (e) => {
            if (e.target.files.length) loadNormalMapForModel(e.target.files[0]);
        });
        
        document.getElementById('bumpIntensity').addEventListener('input', () => {
            if (currentBumpHeightImg) {
                updateSphereBumpIntensity();
            }
        });
        
        document.getElementById('normalIntensity').addEventListener('input', () => {
            updateNormalIntensity();
        });
        
        document.getElementById('ambient').addEventListener('input', (e) => {
            const val = parseFloat(e.target.value);
            ambientLight.intensity = val;
            if (sphere.material && sphere.material.uniforms) {
                sphere.material.uniforms.uAmbientIntensity.value = val;
            }
            if (userModel) {
                userModel.traverse(child => {
                    if (child.isMesh && child.material && child.material.uniforms) {
                        child.material.uniforms.uAmbientIntensity.value = val;
                    }
                });
            }
        });
        
        document.getElementById('btnPhong').addEventListener('click', () => {
            const setRoughMetal = (obj) => {
                if (!obj) return;
                obj.traverse(child => {
                    if (child.isMesh && child.material) {
                        if (child.material.uniforms) {
                            child.material.uniforms.uRoughness.value = 0.47;
                            child.material.uniforms.uMetalness.value = 0.18;
                        }
                    }
                });
            };
            if (userModel) setRoughMetal(userModel);
            if (sphere.material && sphere.material.uniforms) {
                sphere.material.uniforms.uRoughness.value = 0.47;
                sphere.material.uniforms.uMetalness.value = 0.18;
            }
            document.getElementById('statusMsg').innerHTML = `Material: Phong-style | Sphere bump: ${currentBumpHeightImg ? 'active' : 'inactive'}`;
        });
        
        document.getElementById('btnBlinn').addEventListener('click', () => {
            const setBlinn = (obj) => {
                if (!obj) return;
                obj.traverse(child => {
                    if (child.isMesh && child.material) {
                        if (child.material.uniforms) {
                            child.material.uniforms.uRoughness.value = 0.28;
                            child.material.uniforms.uMetalness.value = 0.38;
                        }
                    }
                });
            };
            if (userModel) setBlinn(userModel);
            if (sphere.material && sphere.material.uniforms) {
                sphere.material.uniforms.uRoughness.value = 0.28;
                sphere.material.uniforms.uMetalness.value = 0.38;
            }
            document.getElementById('statusMsg').innerHTML = `Material: Blinn-Phong style | Sphere bump: ${currentBumpHeightImg ? 'active' : 'inactive'}`;
        });
        
        // Анимация поворота
        function animate() {
            requestAnimationFrame(animate);
            sphere.rotation.y += 0.004;
            if (userModel) {
                userModel.rotation.y += 0.004;
            }
            controls.update();
            renderer.render(scene, camera);
        }
        animate();
        
        window.addEventListener('resize', () => {
            camera.aspect = window.innerWidth / window.innerHeight;
            camera.updateProjectionMatrix();
            renderer.setSize(window.innerWidth, window.innerHeight);
        });
        
        // Добавляем статус
        const statusDiv = document.createElement('div');
        statusDiv.className = 'status';
        statusDiv.id = 'statusMsg';
        statusDiv.innerHTML = 'Shader bump/normal ready';
        document.body.appendChild(statusDiv);
        
        const legendDiv = document.createElement('div');
        legendDiv.className = 'legend';
        legendDiv.innerHTML = 'Bump (shader) | Normal (shader intensity)';
        document.body.appendChild(legendDiv);

    </script>
</body>
</html>

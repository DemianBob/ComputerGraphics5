<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Bump Map (Sphere) + Normal Map (Model) - Pure Shader Calculations</title>
    <style>
        body {
            margin: 0;
            overflow: hidden;
            font-family: monospace;
        }
        .controls {
            position: absolute;
            top: 12px;
            right: 12px;
            background: rgba(0,0,0,0.75);
            backdrop-filter: blur(4px);
            padding: 8px 12px;
            border-radius: 8px;
            color: #eee;
            z-index: 100;
            font-size: 12px;
            min-width: 210px;
        }
        .controls h3 {
            margin: 0 0 6px 0;
            font-size: 13px;
            color: #ffaa66;
        }
        .control-group {
            margin-bottom: 8px;
        }
        .control-group label {
            font-size: 11px;
            display: block;
            margin-bottom: 3px;
        }
        input[type="range"] {
            width: 100%;
            cursor: pointer;
            height: 3px;
        }
        button {
            background: #333;
            border: none;
            padding: 4px 8px;
            border-radius: 4px;
            cursor: pointer;
            font-size: 11px;
            color: white;
            margin-right: 6px;
            margin-top: 2px;
        }
        button:hover {
            background: #ffaa44;
            color: black;
        }
        .file-selector {
            margin-top: 6px;
            padding-top: 4px;
            border-top: 1px solid #555;
        }
        .file-selector label {
            font-size: 10px;
        }
        .file-selector input {
            font-size: 10px;
            background: #222;
            color: white;
            border: 1px solid #666;
            border-radius: 4px;
            padding: 3px 5px;
            width: calc(100% - 12px);
        }
        .compact-row {
            display: flex;
            align-items: center;
            justify-content: space-between;
            gap: 8px;
        }
        .separator {
            height: 1px;
            background: #555;
            margin: 8px 0;
        }
        #resetModelBtn, #resetBumpBtn, #resetNormalBtn {
            width: 100%;
            background: #444;
            margin-top: 5px;
        }
        #resetBumpBtn {
            background: #5a3a2a;
        }
        #resetNormalBtn {
            background: #3a3a5a;
        }
        .status {
            position: absolute;
            bottom: 12px;
            left: 12px;
            background: rgba(0,0,0,0.6);
            padding: 4px 10px;
            border-radius: 5px;
            font-size: 11px;
            pointer-events: none;
            z-index: 100;
            color: #ddd;
            font-family: monospace;
        }
        .legend {
            position: absolute;
            bottom: 12px;
            right: 12px;
            background: rgba(0,0,0,0.55);
            padding: 5px 10px;
            border-radius: 6px;
            font-size: 10px;
            color: #ccc;
            text-align: right;
            pointer-events: none;
        }
    </style>
</head>
<body>
    <div class="controls">
        <h3>Bump (Sphere) | Normal (Model) - PURE SHADER</h3>
        
        <div class="control-group">
            <div class="compact-row">
                <label>Bump Intensity (sphere)</label>
                <span style="font-size:9px;">height scale</span>
            </div>
            <input type="range" id="bumpIntensity" min="0" max="2.5" step="0.01" value="0.9">
        </div>
        
        <div class="control-group">
            <div class="compact-row">
                <label>Normal Intensity (model)</label>
                <span style="font-size:9px;">strength</span>
            </div>
            <input type="range" id="normalIntensity" min="0" max="2.0" step="0.01" value="1.0">
        </div>
        
        <div class="compact-row">
            <button id="btnPhong">Phong</button>
            <button id="btnBlinn">Blinn</button>
            <label>Ambient</label>
            <input type="range" id="ambient" min="0" max="0.8" step="0.01" value="0.32" style="width:55px;">
        </div>
        
        <div class="file-selector">
            <label>Height Map (for BUMP on sphere)</label>
            <input type="file" id="textureFile" accept="image/*">
            <button id="resetBumpBtn">Clear bump map</button>
        </div>
        
        <div class="file-selector">
            <label>Normal Map (for NORMAL on model)</label>
            <input type="file" id="normalMapFile" accept="image/*">
            <button id="resetNormalBtn" style="margin-top:4px;">Clear normal map</button>
        </div>
        
        <div class="file-selector">
            <label>3D Model (OBJ/GLTF)</label>
            <input type="file" id="modelFile" accept=".obj,.gltf,.glb">
            <button id="resetModelBtn">Remove model</button>
        </div>
    </div>
    <div class="status" id="statusMsg">Ready - Pure shader calculations</div>
    <div class="legend">Sphere: Bump mapping (height→normal in shader)<br>Model: Normal mapping (direct in shader)</div>

    <script type="importmap">
        {
            "imports": {
                "three": "https://unpkg.com/three@0.128.0/build/three.module.js",
                "three/addons/": "https://unpkg.com/three@0.128.0/examples/jsm/"
            }
        }
    </script>

    <script type="module">
        import * as THREE from 'three';
        import { OrbitControls } from 'three/addons/controls/OrbitControls.js';
        import { GLTFLoader } from 'three/addons/loaders/GLTFLoader.js';
        import { OBJLoader } from 'three/addons/loaders/OBJLoader.js';

        // Сцена
        const scene = new THREE.Scene();
        scene.background = new THREE.Color(0x050510);
        scene.fog = new THREE.FogExp2(0x050510, 0.008);

        const camera = new THREE.PerspectiveCamera(42, window.innerWidth / window.innerHeight, 0.1, 100);
        camera.position.set(2.5, 1.6, 5.2);
        camera.lookAt(0, 0.2, 0);

        const renderer = new THREE.WebGLRenderer({ antialias: true });
        renderer.setSize(window.innerWidth, window.innerHeight);
        renderer.shadowMap.enabled = true;
        document.body.appendChild(renderer.domElement);

        const controls = new OrbitControls(camera, renderer.domElement);
        controls.enableDamping = true;
        controls.dampingFactor = 0.05;
        controls.target.set(0, 0.2, 0);

        // Освещение
        const ambientLight = new THREE.AmbientLight(0x404060, 0.32);
        scene.add(ambientLight);
        const mainLight = new THREE.DirectionalLight(0xfff5e0, 1.25);
        mainLight.position.set(3, 4.2, 2);
        mainLight.castShadow = true;
        scene.add(mainLight);
        const fillLight = new THREE.PointLight(0x88aacc, 0.5);
        fillLight.position.set(-2, 2, 3);
        scene.add(fillLight);
        const backLight = new THREE.PointLight(0xffaa77, 0.45);
        backLight.position.set(1, 2.2, -3);
        scene.add(backLight);
        
        const rimLight = new THREE.PointLight(0xffaa88, 0.35);
        rimLight.position.set(1.5, 1, -2.5);
        scene.add(rimLight);

        // Вспомогательные объекты
        const grid = new THREE.GridHelper(10, 20, 0x88aacc, 0x335577);
        grid.position.y = -0.85;
        grid.material.transparent = true;
        grid.material.opacity = 0.3;
        scene.add(grid);
        
        const ground = new THREE.Mesh(
            new THREE.PlaneGeometry(10, 10),
            new THREE.ShadowMaterial({ opacity: 0.4, transparent: true, side: THREE.DoubleSide })
        );
        ground.rotation.x = -Math.PI / 2;
        ground.position.y = -0.85;
        ground.receiveShadow = true;
        scene.add(ground);
        
        const sphereVertexShader = `
            varying vec2 vUv;
            varying vec3 vViewPosition;
            varying vec3 vWorldNormal;
            varying vec3 vWorldPosition;
            
            void main() {
                vUv = uv;
                vec4 mvPosition = modelViewMatrix * vec4(position, 1.0);
                vViewPosition = -mvPosition.xyz;
                vWorldNormal = normalize(normalMatrix * normal);
                vec4 worldPos = modelMatrix * vec4(position, 1.0);
                vWorldPosition = worldPos.xyz;
                gl_PointSize = 1.0;
                gl_Position = projectionMatrix * mvPosition;
            }
        `;
        
        const sphereFragmentShader = `
            uniform vec3 uColor;
            uniform sampler2D uHeightMap;
            uniform float uBumpIntensity;
            uniform float uAmbientIntensity;
            uniform vec3 uLightDir;
            uniform vec3 uLightColor;
            uniform vec3 uFillLightPos;
            uniform vec3 uFillLightColor;
            uniform vec3 uBackLightPos;
            uniform vec3 uBackLightColor;
            uniform float uRoughness;
            uniform float uMetalness;
            uniform float uTime;
            
            varying vec2 vUv;
            varying vec3 vViewPosition;
            varying vec3 vWorldNormal;
            varying vec3 vWorldPosition;
            
            // Функция получения высоты из текстуры (только чтение, без преобразований)
            float getHeight(vec2 uv) {
                vec4 heightColor = texture2D(uHeightMap, uv);
                // Преобразуем RGB в яркость
                return (heightColor.r + heightColor.g + heightColor.b) / 3.0;
            }
            
            // ВЫЧИСЛЕНИЕ NORMAL ИЗ HEIGHT MAP
            vec3 calculateBumpedNormal(vec2 uv, vec3 normal, float scale) {
                // Размер шага для выборки соседних пикселей (в зависимости от UV)
                vec2 texelSize = vec2(1.0 / 512.0, 1.0 / 512.0);
                
                // Получаем высоты в 4 направлениях для более точного градиента
                float h = getHeight(uv);
                float hU = getHeight(uv + vec2(texelSize.x, 0.0));
                float hV = getHeight(uv + vec2(0.0, texelSize.y));
                float hU2 = getHeight(uv - vec2(texelSize.x, 0.0));
                float hV2 = getHeight(uv - vec2(0.0, texelSize.y));
                
                // Центральная разность для более точного градиента
                float du = (hU - hU2) * scale;
                float dv = (hV - hV2) * scale;
                
                // Строим tangent space
                vec3 tangent = vec3(1.0, 0.0, 0.0);
                vec3 bitangent = vec3(0.0, 1.0, 0.0);
                
                // Адаптивный tangent space на основе нормали
                if (abs(normal.x) > 0.9) {
                    tangent = vec3(0.0, 0.0, 1.0);
                    bitangent = vec3(0.0, 1.0, 0.0);
                } else if (abs(normal.y) > 0.9) {
                    tangent = vec3(1.0, 0.0, 0.0);
                    bitangent = vec3(0.0, 0.0, 1.0);
                }
                
                tangent = normalize(tangent - dot(tangent, normal) * normal);
                bitangent = cross(normal, tangent);
                
                // ВЫЧИСЛЯЕМ perturbed normal (bump mapping calculation)
                vec3 perturbedNormal = normalize(normal + du * tangent + dv * bitangent);
                return perturbedNormal;
            }
            
            // Функция освещения
            vec3 calculateLighting(vec3 normal, vec3 viewDir, vec3 lightDir, vec3 lightCol, float intensity) {
                float diff = max(dot(normal, lightDir), 0.0);
                vec3 diffuse = diff * lightCol * intensity;
                
                vec3 halfVec = normalize(lightDir + viewDir);
                float spec = pow(max(dot(normal, halfVec), 0.0), 32.0);
                vec3 specular = spec * lightCol * intensity * 0.6;
                
                return diffuse + specular;
            }
            
            void main() {
                vec3 albedo = uColor;
                vec3 normal = normalize(vWorldNormal);
                
                // ПРИМЕНЯЕМ BUMP MAPPING (расчёт в шейдере)
                vec3 finalNormal = normal;
                if (uBumpIntensity > 0.0 && uHeightMap != null) {
                    finalNormal = calculateBumpedNormal(vUv, normal, uBumpIntensity);
                }
                
                vec3 viewDir = normalize(-vViewPosition);
                
                // Направленное освещение
                vec3 lightDirMain = normalize(uLightDir);
                vec3 mainLighting = calculateLighting(finalNormal, viewDir, lightDirMain, uLightColor, 1.0);
                
                // Fill light (point)
                vec3 fillLightDir = normalize(uFillLightPos - vWorldPosition);
                float fillDist = length(uFillLightPos - vWorldPosition);
                float fillAtten = 1.0 / (1.0 + fillDist * fillDist * 0.5);
                vec3 fillLighting = calculateLighting(finalNormal, viewDir, fillLightDir, uFillLightColor, 0.5) * fillAtten;
                
                // Back light
                vec3 backLightDir = normalize(uBackLightPos - vWorldPosition);
                float backDist = length(uBackLightPos - vWorldPosition);
                float backAtten = 1.0 / (1.0 + backDist * backDist * 0.5);
                vec3 backLighting = calculateLighting(finalNormal, viewDir, backLightDir, uBackLightColor, 0.45) * backAtten;
                
                // Ambient
                vec3 ambient = albedo * uAmbientIntensity;
                
                vec3 color = ambient + (mainLighting + fillLighting + backLighting) * albedo;
                
                // Применяем roughness/metalness
                color = mix(color, color * 0.7, uRoughness);
                color = mix(color, color * 1.3, uMetalness);
                
                gl_FragColor = vec4(color, 1.0);
            }
        `;
        
        // Материал сферы с шейдерами
        const sphereUniforms = {
            uColor: { value: new THREE.Color(0xff6600) },
            uHeightMap: { value: null },
            uBumpIntensity: { value: 0.9 },
            uAmbientIntensity: { value: 0.32 },
            uLightDir: { value: new THREE.Vector3(3, 4.2, 2).normalize() },
            uLightColor: { value: new THREE.Color(0xfff5e0) },
            uFillLightPos: { value: new THREE.Vector3(-2, 2, 3) },
            uFillLightColor: { value: new THREE.Color(0x88aacc) },
            uBackLightPos: { value: new THREE.Vector3(1, 2.2, -3) },
            uBackLightColor: { value: new THREE.Color(0xffaa77) },
            uRoughness: { value: 0.45 },
            uMetalness: { value: 0.2 },
            uTime: { value: 0 }
        };
        
        const sphereMat = new THREE.ShaderMaterial({
            uniforms: sphereUniforms,
            vertexShader: sphereVertexShader,
            fragmentShader: sphereFragmentShader,
            lights: false,
            side: THREE.DoubleSide
        });
        
        const sphereGeo = new THREE.SphereGeometry(0.85, 160, 160);
        const sphere = new THREE.Mesh(sphereGeo, sphereMat);
        sphere.position.set(-1.2, 0, 0);
        sphere.castShadow = true;
        sphere.receiveShadow = true;
        scene.add(sphere);
        
        const modelVertexShader = `
            varying vec2 vUv;
            varying vec3 vViewPosition;
            varying vec3 vWorldNormal;
            varying vec3 vWorldPosition;
            varying mat3 vTBN;
            
            attribute vec3 tangent;
            attribute vec3 bitangent;
            
            void main() {
                vUv = uv;
                vec4 mvPosition = modelViewMatrix * vec4(position, 1.0);
                vViewPosition = -mvPosition.xyz;
                
                vec4 worldPos = modelMatrix * vec4(position, 1.0);
                vWorldPosition = worldPos.xyz;
                
                // Вычисляем TBN матрицу для tangent space
                vec3 normalW = normalize(normalMatrix * normal);
                vec3 tangentW = normalize(normalMatrix * tangent);
                vec3 bitangentW = normalize(normalMatrix * bitangent);
                vTBN = mat3(tangentW, bitangentW, normalW);
                
                vWorldNormal = normalize(normalMatrix * normal);
                
                gl_PointSize = 1.0;
                gl_Position = projectionMatrix * mvPosition;
            }
        `;
        
        const modelFragmentShader = `
            uniform sampler2D uNormalMap;
            uniform float uNormalIntensity;
            uniform vec3 uColor;
            uniform float uAmbientIntensity;
            uniform vec3 uLightDir;
            uniform vec3 uLightColor;
            uniform vec3 uFillLightPos;
            uniform vec3 uFillLightColor;
            uniform vec3 uBackLightPos;
            uniform vec3 uBackLightColor;
            uniform float uRoughness;
            uniform float uMetalness;
            
            varying vec2 vUv;
            varying vec3 vViewPosition;
            varying vec3 vWorldNormal;
            varying vec3 vWorldPosition;
            varying mat3 vTBN;
            
            vec3 calculateLighting(vec3 normal, vec3 viewDir, vec3 lightDir, vec3 lightCol, float intensity) {
                float diff = max(dot(normal, lightDir), 0.0);
                vec3 diffuse = diff * lightCol * intensity;
                
                vec3 halfVec = normalize(lightDir + viewDir);
                float spec = pow(max(dot(normal, halfVec), 0.0), 32.0);
                vec3 specular = spec * lightCol * intensity * 0.6;
                
                return diffuse + specular;
            }
            
            void main() {
                vec3 albedo = uColor;
                vec3 normal = normalize(vWorldNormal);
                
                // ПРИМЕНЯЕМ NORMAL MAPPING (чтение и преобразование normal map в шейдере)
                if (uNormalIntensity > 0.0 && uNormalMap != null) {
                    // Читаем normal map (значения в диапазоне [0,1])
                    vec3 tangentNormal = texture2D(uNormalMap, vUv).rgb;
                    // Конвертируем из [0,1] в [-1,1] (расчёт в шейдере)
                    tangentNormal = tangentNormal * 2.0 - 1.0;
                    
                    // Применяем интенсивность
                    tangentNormal.xy *= uNormalIntensity;
                    tangentNormal = normalize(tangentNormal);
                    
                    // Конвертируем из tangent space в world space
                    normal = normalize(vTBN * tangentNormal);
                }
                
                vec3 viewDir = normalize(-vViewPosition);
                
                // Направленное освещение
                vec3 lightDirMain = normalize(uLightDir);
                vec3 mainLighting = calculateLighting(normal, viewDir, lightDirMain, uLightColor, 1.0);
                
                // Fill light
                vec3 fillLightDir = normalize(uFillLightPos - vWorldPosition);
                float fillDist = length(uFillLightPos - vWorldPosition);
                float fillAtten = 1.0 / (1.0 + fillDist * fillDist * 0.5);
                vec3 fillLighting = calculateLighting(normal, viewDir, fillLightDir, uFillLightColor, 0.5) * fillAtten;
                
                // Back light
                vec3 backLightDir = normalize(uBackLightPos - vWorldPosition);
                float backDist = length(uBackLightPos - vWorldPosition);
                float backAtten = 1.0 / (1.0 + backDist * backDist * 0.5);
                vec3 backLighting = calculateLighting(normal, viewDir, backLightDir, uBackLightColor, 0.45) * backAtten;
                
                // Ambient
                vec3 ambient = albedo * uAmbientIntensity;
                
                vec3 color = ambient + (mainLighting + fillLighting + backLighting) * albedo;
                
                color = mix(color, color * 0.7, uRoughness);
                color = mix(color, color * 1.3, uMetalness);
                
                gl_FragColor = vec4(color, 1.0);
            }
        `;
        
        // Функция для создания материала модели с шейдерами
        function createModelShaderMaterial(normalMap = null, intensity = 1.0) {
            return new THREE.ShaderMaterial({
                uniforms: {
                    uNormalMap: { value: normalMap },
                    uNormalIntensity: { value: intensity },
                    uColor: { value: new THREE.Color(0xccaa88) },
                    uAmbientIntensity: { value: 0.32 },
                    uLightDir: { value: new THREE.Vector3(3, 4.2, 2).normalize() },
                    uLightColor: { value: new THREE.Color(0xfff5e0) },
                    uFillLightPos: { value: new THREE.Vector3(-2, 2, 3) },
                    uFillLightColor: { value: new THREE.Color(0x88aacc) },
                    uBackLightPos: { value: new THREE.Vector3(1, 2.2, -3) },
                    uBackLightColor: { value: new THREE.Color(0xffaa77) },
                    uRoughness: { value: 0.45 },
                    uMetalness: { value: 0.2 }
                },
                vertexShader: modelVertexShader,
                fragmentShader: modelFragmentShader,
                lights: false,
                side: THREE.DoubleSide
            });
        }
        
        // Функция для вычисления tangent и bitangent
        function computeTangents(geometry) {
            if (!geometry.attributes.uv) return;
            
            const positions = geometry.attributes.position.array;
            const normals = geometry.attributes.normal.array;
            const uvs = geometry.attributes.uv.array;
            const indices = geometry.index.array;
            
            const tangents = new Float32Array(positions.length);
            const bitangents = new Float32Array(positions.length);
            
            for (let i = 0; i < indices.length; i += 3) {
                const i1 = indices[i];
                const i2 = indices[i+1];
                const i3 = indices[i+2];
                
                const v1 = new THREE.Vector3(positions[i1*3], positions[i1*3+1], positions[i1*3+2]);
                const v2 = new THREE.Vector3(positions[i2*3], positions[i2*3+1], positions[i2*3+2]);
                const v3 = new THREE.Vector3(positions[i3*3], positions[i3*3+1], positions[i3*3+2]);
                
                const uv1 = new THREE.Vector2(uvs[i1*2], uvs[i1*2+1]);
                const uv2 = new THREE.Vector2(uvs[i2*2], uvs[i2*2+1]);
                const uv3 = new THREE.Vector2(uvs[i3*2], uvs[i3*2+1]);
                
                const edge1 = new THREE.Vector3().subVectors(v2, v1);
                const edge2 = new THREE.Vector3().subVectors(v3, v1);
                const deltaUV1 = new THREE.Vector2().subVectors(uv2, uv1);
                const deltaUV2 = new THREE.Vector2().subVectors(uv3, uv1);
                
                const f = 1.0 / (deltaUV1.x * deltaUV2.y - deltaUV2.x * deltaUV1.y);
                
                const tangent = new THREE.Vector3(
                    f * (deltaUV2.y * edge1.x - deltaUV1.y * edge2.x),
                    f * (deltaUV2.y * edge1.y - deltaUV1.y * edge2.y),
                    f * (deltaUV2.y * edge1.z - deltaUV1.y * edge2.z)
                );
                
                const bitangent = new THREE.Vector3(
                    f * (-deltaUV2.x * edge1.x + deltaUV1.x * edge2.x),
                    f * (-deltaUV2.x * edge1.y + deltaUV1.x * edge2.y),
                    f * (-deltaUV2.x * edge1.z + deltaUV1.x * edge2.z)
                );
                
                tangents[i1*3] += tangent.x;
                tangents[i1*3+1] += tangent.y;
                tangents[i1*3+2] += tangent.z;
                tangents[i2*3] += tangent.x;
                tangents[i2*3+1] += tangent.y;
                tangents[i2*3+2] += tangent.z;
                tangents[i3*3] += tangent.x;
                tangents[i3*3+1] += tangent.y;
                tangents[i3*3+2] += tangent.z;
                
                bitangents[i1*3] += bitangent.x;
                bitangents[i1*3+1] += bitangent.y;
                bitangents[i1*3+2] += bitangent.z;
                bitangents[i2*3] += bitangent.x;
                bitangents[i2*3+1] += bitangent.y;
                bitangents[i2*3+2] += bitangent.z;
                bitangents[i3*3] += bitangent.x;
                bitangents[i3*3+1] += bitangent.y;
                bitangents[i3*3+2] += bitangent.z;
            }
            
            geometry.setAttribute('tangent', new THREE.BufferAttribute(tangents, 3));
            geometry.setAttribute('bitangent', new THREE.BufferAttribute(bitangents, 3));
        }
        
        // Переменные для модели
        let userModel = null;
        let currentNormalMapTexture = null;
        let currentNormalMapStrength = 1.0;
        let currentBumpHeightImg = null;
        
        // Функции для работы с bump mapping сферы (только загрузка текстуры)
        function applyBumpToSphere(img, intensity) {
            if (!sphere || !img) return;
            const texture = new THREE.Texture(img);
            texture.wrapS = THREE.RepeatWrapping;
            texture.wrapT = THREE.RepeatWrapping;
            texture.repeat.set(2.0, 2.0);
            texture.needsUpdate = true;
            sphereMat.uniforms.uHeightMap.value = texture;
            sphereMat.uniforms.uBumpIntensity.value = intensity;
            sphereMat.needsUpdate = true;
        }
        
        function removeBumpFromSphere() {
            sphereMat.uniforms.uHeightMap.value = null;
            sphereMat.uniforms.uBumpIntensity.value = 0;
            sphereMat.needsUpdate = true;
        }
        
        function updateSphereBumpIntensity() {
            if (currentBumpHeightImg) {
                const val = parseFloat(document.getElementById('bumpIntensity').value);
                sphereMat.uniforms.uBumpIntensity.value = val;
                document.getElementById('statusMsg').innerHTML = `Sphere: BUMP (shader calc) intensity ${val.toFixed(2)} | Normal intensity: ${currentNormalMapStrength.toFixed(2)}`;
            }
        }
        
        // Функции для работы с normal mapping модели (только загрузка текстуры)
        function applyNormalMapToModel(modelObj, normalTexture, strength) {
            if (!modelObj || !normalTexture) return;
            
            const texture = new THREE.Texture(normalTexture);
            texture.wrapS = THREE.RepeatWrapping;
            texture.wrapT = THREE.RepeatWrapping;
            texture.repeat.set(1.0, 1.0);
            texture.needsUpdate = true;
            
            modelObj.traverse(child => {
                if (child.isMesh && child.material && child.material.uniforms) {
                    child.material.uniforms.uNormalMap.value = texture;
                    child.material.uniforms.uNormalIntensity.value = strength;
                    child.material.needsUpdate = true;
                }
            });
        }
        
        function updateNormalIntensity() {
            if (userModel && currentNormalMapTexture) {
                currentNormalMapStrength = parseFloat(document.getElementById('normalIntensity').value);
                userModel.traverse(child => {
                    if (child.isMesh && child.material && child.material.uniforms) {
                        child.material.uniforms.uNormalIntensity.value = currentNormalMapStrength;
                        child.material.needsUpdate = true;
                    }
                });
                document.getElementById('statusMsg').innerHTML = `Normal intensity: ${currentNormalMapStrength.toFixed(2)} | Sphere bump: ${currentBumpHeightImg ? 'active' : 'inactive'}`;
            }
        }
        
        function clearNormalMapFromModel(modelObj) {
            if (!modelObj) return;
            modelObj.traverse(child => {
                if (child.isMesh && child.material && child.material.uniforms) {
                    child.material.uniforms.uNormalMap.value = null;
                    child.material.uniforms.uNormalIntensity.value = 0;
                    child.material.needsUpdate = true;
                }
            });
        }
        
        // Загрузка текстур (только чтение, без предварительных расчётов)
        function loadBumpTextureFromFile(file) {
            const reader = new FileReader();
            reader.onload = (e) => {
                const img = new Image();
                img.onload = () => {
                    currentBumpHeightImg = img;
                    const intensity = parseFloat(document.getElementById('bumpIntensity').value);
                    applyBumpToSphere(img, intensity);
                    document.getElementById('statusMsg').innerHTML = `Sphere BUMP loaded: ${file.name} - calculations in shader`;
                };
                img.src = e.target.result;
            };
            reader.readAsDataURL(file);
        }
        
        function resetBumpMap() {
            currentBumpHeightImg = null;
            removeBumpFromSphere();
            document.getElementById('statusMsg').innerHTML = `Bump map cleared - calculations in shader disabled`;
        }
        
        function loadNormalMapForModel(file) {
            const reader = new FileReader();
            reader.onload = (e) => {
                const img = new Image();
                img.onload = () => {
                    currentNormalMapTexture = img;
                    currentNormalMapStrength = parseFloat(document.getElementById('normalIntensity').value);
                    if (userModel) {
                        applyNormalMapToModel(userModel, img, currentNormalMapStrength);
                        document.getElementById('statusMsg').innerHTML = `Normal map loaded: ${file.name} - calculations in shader`;
                    } else {
                        document.getElementById('statusMsg').innerHTML = `Normal map loaded (${file.name}), load model first`;
                    }
                };
                img.src = e.target.result;
            };
            reader.readAsDataURL(file);
        }
        
        function resetNormalMapOnModel() {
            currentNormalMapTexture = null;
            if (userModel) {
                clearNormalMapFromModel(userModel);
                document.getElementById('statusMsg').innerHTML = `Normal map cleared - calculations in shader disabled`;
            }
        }
        
        // Загрузка модели
        function disposeOldModel() {
            if (userModel) {
                scene.remove(userModel);
                userModel.traverse((child) => {
                    if (child.isMesh) {
                        if (child.geometry) child.geometry.dispose();
                        if (child.material) child.material.dispose();
                    }
                });
                userModel = null;
            }
        }
        
        function alignModelToGround(modelObj, targetX) {
            const box = new THREE.Box3().setFromObject(modelObj);
            const center = box.getCenter(new THREE.Vector3());
            const size = box.getSize(new THREE.Vector3());
            const maxDim = Math.max(size.x, size.y, size.z);
            const targetScale = 1.25 / maxDim;
            modelObj.scale.set(targetScale, targetScale, targetScale);
            
            const scaledBox = new THREE.Box3().setFromObject(modelObj);
            const scaledCenter = scaledBox.getCenter(new THREE.Vector3());
            modelObj.position.x = targetX - scaledCenter.x;
            modelObj.position.z = -scaledCenter.z;
            
            const finalBox = new THREE.Box3().setFromObject(modelObj);
            const finalMinY = finalBox.min.y;
            const groundLevel = -0.85;
            const yOffset = groundLevel - finalMinY;
            modelObj.position.y += yOffset;
        }
        
        function applyShaderToModel(modelObj) {
            modelObj.traverse(child => {
                if (child.isMesh && child.geometry.attributes.uv) {
                    computeTangents(child.geometry);
                    const shaderMat = createModelShaderMaterial(null, 0);
                    if (child.material && child.material.color) {
                        shaderMat.uniforms.uColor.value = child.material.color;
                    }
                    child.material.dispose();
                    child.material = shaderMat;
                }
            });
        }
        
        const gltfLoader = new GLTFLoader();
        const objLoader = new OBJLoader();
        
        document.getElementById('modelFile').addEventListener('change', (e) => {
            const file = e.target.files[0];
            if (!file) return;
            const ext = file.name.split('.').pop().toLowerCase();
            
            const loadAndApplyShader = (modelObj) => {
                disposeOldModel();
                userModel = modelObj;
                scene.add(userModel);
                alignModelToGround(userModel, 1.2);
                applyShaderToModel(userModel);
                if (currentNormalMapTexture) {
                    applyNormalMapToModel(userModel, currentNormalMapTexture, currentNormalMapStrength);
                }
                document.getElementById('statusMsg').innerHTML = `Model loaded: ${file.name} - normal mapping calculations in shader`;
            };
            
            if (ext === 'obj') {
                const reader = new FileReader();
                reader.onload = (ev) => {
                    try {
                        const objModel = objLoader.parse(ev.target.result);
                        loadAndApplyShader(objModel);
                    } catch(err) {
                        document.getElementById('statusMsg').innerHTML = 'OBJ parse error';
                    }
                };
                reader.readAsText(file);
            } else if (ext === 'gltf' || ext === 'glb') {
                const reader = new FileReader();
                reader.onload = (ev) => {
                    gltfLoader.parse(ev.target.result, '', (gltf) => {
                        loadAndApplyShader(gltf.scene);
                    }, () => {
                        document.getElementById('statusMsg').innerHTML = 'GLTF error';
                    });
                };
                reader.readAsArrayBuffer(file);
            }
        });
        
        // UI обработчики
        document.getElementById('resetModelBtn').addEventListener('click', () => {
            disposeOldModel();
            document.getElementById('statusMsg').innerHTML = 'Model removed';
        });
        
        document.getElementById('resetNormalBtn').addEventListener('click', () => {
            resetNormalMapOnModel();
        });
        
        document.getElementById('resetBumpBtn').addEventListener('click', () => {
            resetBumpMap();
        });
        
        document.getElementById('textureFile').addEventListener('change', (e) => {
            if (e.target.files.length) loadBumpTextureFromFile(e.target.files[0]);
        });
        
        document.getElementById('normalMapFile').addEventListener('change', (e) => {
            if (e.target.files.length) loadNormalMapForModel(e.target.files[0]);
        });
        
        document.getElementById('bumpIntensity').addEventListener('input', () => {
            if (currentBumpHeightImg) updateSphereBumpIntensity();
        });
        
        document.getElementById('normalIntensity').addEventListener('input', () => {
            updateNormalIntensity();
        });
        
        document.getElementById('ambient').addEventListener('input', (e) => {
            const val = parseFloat(e.target.value);
            ambientLight.intensity = val;
            sphereMat.uniforms.uAmbientIntensity.value = val;
            if (userModel) {
                userModel.traverse(child => {
                    if (child.isMesh && child.material && child.material.uniforms) {
                        child.material.uniforms.uAmbientIntensity.value = val;
                    }
                });
            }
        });
        
        document.getElementById('btnPhong').addEventListener('click', () => {
            sphereMat.uniforms.uRoughness.value = 0.47;
            sphereMat.uniforms.uMetalness.value = 0.18;
            if (userModel) {
                userModel.traverse(child => {
                    if (child.isMesh && child.material && child.material.uniforms) {
                        child.material.uniforms.uRoughness.value = 0.47;
                        child.material.uniforms.uMetalness.value = 0.18;
                    }
                });
            }
            document.getElementById('statusMsg').innerHTML = 'Material: Phong style';
        });
        
        document.getElementById('btnBlinn').addEventListener('click', () => {
            sphereMat.uniforms.uRoughness.value = 0.28;
            sphereMat.uniforms.uMetalness.value = 0.38;
            if (userModel) {
                userModel.traverse(child => {
                    if (child.isMesh && child.material && child.material.uniforms) {
                        child.material.uniforms.uRoughness.value = 0.28;
                        child.material.uniforms.uMetalness.value = 0.38;
                    }
                });
            }
            document.getElementById('statusMsg').innerHTML = 'Material: Blinn-Phong style';
        });
        
        // Анимация
        let time = 0;
        function animate() {
            requestAnimationFrame(animate);
            time += 0.016;
            sphere.rotation.y += 0.004;
            sphereMat.uniforms.uTime.value = time;
            if (userModel) {
                userModel.rotation.y += 0.004;
            }
            controls.update();
            renderer.render(scene, camera);
        }
        animate();
        
        window.addEventListener('resize', () => {
            camera.aspect = window.innerWidth / window.innerHeight;
            camera.updateProjectionMatrix();
            renderer.setSize(window.innerWidth, window.innerHeight);
        });
        
        document.getElementById('statusMsg').innerHTML = 'Ready - All calculations (bump/normal) performed in shaders';
    </script>
</body>
</html>
